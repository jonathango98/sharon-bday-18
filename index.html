<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Happy Birthday Sharon 🎂</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- Loading screen -->
  <div id="loading-screen" aria-live="polite" aria-label="Loading">
    <div class="ls-inner">
      <div class="ls-cake">🎂</div>
      <p class="ls-text" id="ls-text">getting things ready…</p>
      <div class="ls-dots"><span></span><span></span><span></span></div>
    </div>
    <div class="ls-reveal-wrap" id="ls-reveal-wrap">
      <button class="ls-reveal-btn" id="ls-reveal-btn">🎁 click to open your present</button>
    </div>
  </div>

  <header>
    <h1>Happy 28th Birthday, Sharon!</h1>
    <p>here are some messages &amp; memories from the people who love you</p>
  </header>

  <div id="status">
    <div class="spinner"></div>
    <div>Loading messages…</div>
  </div>

  <main id="gallery-wall" hidden></main>

  <div id="lightbox" role="dialog" aria-modal="true" aria-label="Enlarged card">
    <button class="lb-close" aria-label="Close">&times;</button>
    <div class="lb-frame"></div>
  </div>

  <!-- Background music -->
  <audio id="bg-music" loop src="music.mp3"></audio>

  <!-- Floating music toggle -->
  <button id="music-btn" aria-label="Toggle background music" title="Toggle music">
    <span id="music-icon">♪</span>
  </button>

  <script src="config.js"></script>
  <script src="gallery.js"></script>
</body>
</html>
